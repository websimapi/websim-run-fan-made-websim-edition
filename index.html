<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>RUN ~ Fan Made Websim Edition</title>
    <style>
        body { margin: 0; overflow: hidden; background-color: #e0f7fa; font-family: 'Courier New', Courier, monospace; touch-action: none; }
        #game-container { position: absolute; top: 0; left: 0; width: 100%; height: 100%; }
        #ui-layer { position: absolute; top: 0; left: 0; width: 100%; height: 100%; pointer-events: none; }
        #score-display { position: absolute; top: 20px; right: 20px; color: #333; font-size: 24px; font-weight: bold; }
        #title-overlay { 
            position: absolute; top: 50%; left: 50%; transform: translate(-50%, -50%); 
            text-align: center; color: #333; pointer-events: auto;
            background: rgba(255,255,255,0.8); padding: 40px; border-radius: 8px;
            box-shadow: 0 4px 15px rgba(0,0,0,0.1);
        }
        button {
            background: #333; color: white; border: none; padding: 15px 30px; 
            font-size: 18px; cursor: pointer; border-radius: 4px; margin-top: 20px;
            font-family: inherit;
        }
        button:active { background: #555; }
        #mobile-controls {
            position: absolute; bottom: 20px; left: 20px; right: 20px; height: 150px;
            pointer-events: auto; display: none; /* Shown via JS detection */
        }
        #jump-zone {
            position: absolute; bottom: 20px; right: 20px; width: 100px; height: 100px;
            background: rgba(0,0,0,0.1); border-radius: 50%; border: 2px solid rgba(0,0,0,0.2);
            display: flex; justify-content: center; align-items: center; pointer-events: auto;
        }
        #jump-zone:active { background: rgba(0,0,0,0.3); }
        .key-hint { font-size: 12px; color: #666; display: block; margin-top: 5px; }
    </style>
    <script type="importmap">
        {
            "imports": {
                "three": "https://esm.sh/three@0.160.0",
                "nipplejs": "https://esm.sh/nipplejs@0.10.1"
            }
        }
    </script>
</head>
<body>
    <div id="game-container"></div>
    <div id="ui-layer">
        <div id="score-display">DISTANCE: 0</div>
        <div id="mobile-controls">
            <div id="joystick-zone" style="position: absolute; bottom: 20px; left: 20px; width: 120px; height: 120px;"></div>
            <div id="jump-zone">JUMP</div>
        </div>
        <div id="title-overlay">
            <h1 style="margin: 0; font-size: 40px; letter-spacing: 5px;">RUN</h1>
            <p>FAN MADE EDITION</p>
            <div class="key-hint" id="desktop-hint">WASD / ARROWS to Move &bull; SPACE to Jump</div>
            <button id="start-btn">START RUNNING</button>
        </div>
    </div>
    <script type="module" src="./src/main.js"></script>
<script defer src="https://static.cloudflareinsights.com/beacon.min.js/v8c78df7c7c0f484497ecbca7046644da1771523124516" integrity="sha512-8DS7rgIrAmghBFwoOTujcf6D9rXvH8xm8JQ1Ja01h9QX8EzXldiszufYa4IFfKdLUKTTrnSFXLDkUEOTrZQ8Qg==" data-cf-beacon='{"version":"2024.11.0","token":"4c6229722a6346bc8eb5cb0e5eae5d41","server_timing":{"name":{"cfCacheStatus":true,"cfEdge":true,"cfExtPri":true,"cfL4":true,"cfOrigin":true,"cfSpeedBrain":true},"location_startswith":null}}' crossorigin="anonymous"></script>
</body>
</html>
